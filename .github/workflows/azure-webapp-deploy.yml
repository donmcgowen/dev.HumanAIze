name: Build & Deploy to Azure App Service

on:
  push:
    branches:
      - main
  workflow_dispatch:   # allows manual trigger from GitHub Actions UI

env:
  NODE_VERSION: '20'
  APP_NAME: humanaize-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      # ── 1. Checkout code ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Node + pnpm ─────────────────────────────────────────────
      - name: Enable Corepack (pnpm)
        run: corepack enable

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      # ── 3. Install & build ────────────────────────────────────────────────
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app (client + server)
        run: pnpm run build

      # ── 4. Prepare deployment package ─────────────────────────────────────
      - name: Copy package files and install prod node_modules into dist
        run: |
          cp package.json dist/
          cp pnpm-lock.yaml dist/ 2>/dev/null || true
          # Install production-only node_modules inside dist/ so that
          # externalized packages (pdfjs-dist, pdf-parse, etc.) are available
          # at runtime when Azure runs: node dist/index.js
          cd dist
          pnpm install --frozen-lockfile --prod
          cd ..

      # ── 5. Zip for clean deployment ────────────────────────────────────────
      # IMPORTANT: zip from the repo root so dist/ is a subdirectory inside
      # the zip. When Kudu extracts to wwwroot/, files land at wwwroot/dist/
      # which matches the startup command: node dist/index.js
      # clean=true wipes wwwroot before extraction, removing all stale bundles.
      - name: Zip for deployment (dist as subdirectory)
        run: |
          zip -r deploy.zip dist/ -x "dist/**/*.map"
          echo "Deploy zip size: $(du -sh deploy.zip)"
          echo "Zip top-level entries:"
          unzip -l deploy.zip | grep -v '/assets/' | head -20

      # ── 6. Deploy via Kudu ZipDeploy with clean=true ──────────────────────
      # clean=true ensures the wwwroot is wiped before new files are written,
      # preventing old JS bundle filenames from being served alongside new ones.
      - name: Deploy via Kudu ZipDeploy (clean)
        env:
          PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
        run: |
          PUBLISH_URL=$(echo "$PUBLISH_PROFILE" | grep -o 'publishUrl="[^"]*"' | head -1 | sed 's/publishUrl="//;s/"//')
          USERNAME=$(echo "$PUBLISH_PROFILE" | grep -o 'userName="[^"]*"' | head -1 | sed 's/userName="//;s/"//')
          PASSWORD=$(echo "$PUBLISH_PROFILE" | grep -o 'userPWD="[^"]*"' | head -1 | sed 's/userPWD="//;s/"//')
          echo "Deploying to: $PUBLISH_URL"
          HTTP_STATUS=$(curl -s -o /tmp/deploy_response.txt -w "%{http_code}" \
            -X POST \
            "https://${PUBLISH_URL}/api/zipdeploy?isAsync=false&clean=true" \
            --user "${USERNAME}:${PASSWORD}" \
            --header "Content-Type: application/zip" \
            --data-binary @deploy.zip \
            --max-time 300)
          echo "HTTP Status: $HTTP_STATUS"
          cat /tmp/deploy_response.txt || true
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "❌ Deployment failed with HTTP $HTTP_STATUS"
            exit 1
          fi
          echo "✅ ZipDeploy complete"

      # ── 7. Print live URL ─────────────────────────────────────────────────
      - name: Deployment complete
        run: echo "✅ Deployed to https://${{ env.APP_NAME }}.azurewebsites.net"
